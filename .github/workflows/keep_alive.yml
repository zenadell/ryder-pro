name: Keep Alive Ping

on:
  schedule:
    # Every 5 minutes — GitHub may delay these, so we also use external monitors
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://www.ryder-pro.com/health/ 2>/dev/null)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is alive."
              exit 0
            fi
            sleep 10
          done
          echo "WARNING: Site may be down after 3 attempts."
          exit 1
