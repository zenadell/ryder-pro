{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'partials/seo.html' %}
    <meta charset="utf-8" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; background: #fafafa; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #cc0000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text-center { text-align: center; }
    </style>
</head>
<body>
    <div class="text-center">
        <div class="loader"></div>
        <h2>Processing your login...</h2>
        <p>Please wait a moment while we redirect you.</p>
    </div>
    
    <script>
        // If Supabase uses implicit flow, tokens are in the hash.
        // But our view expects a 'code' from PKCE flow.
        // We will just redirect if there's an error.
        window.onload = function() {
            var hash = window.location.hash;
            if (hash && hash.includes("access_token")) {
                // Not supported in this simplified flow without frontend client
                alert("Implicit OAuth flow detected. Please configure Supabase to use PKCE.");
                window.location.href = "{% url 'login' %}";
            }
            // If there's no hash and no query params, we shouldn't be here
            if (!window.location.search) {
                window.location.href = "{% url 'login' %}";
            }
        };
    </script>
</body>
</html>
