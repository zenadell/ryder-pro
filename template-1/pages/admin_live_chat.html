<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Live Chat Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a0a;
      --bg-panel: rgba(25, 25, 30, 0.65);
      --bg-hover: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.1);
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --green: #10b981;
      --orange: #f59e0b;
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #0f172a 40%, #000000 100%);
      color: var(--text-main);
      display: flex;
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    html {
      height: -webkit-fill-available;
    }
    /* Layout */
    .sidebar {
      width: 320px;
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      z-index: 1;
    }
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(10, 10, 10, 0.4);
      position: relative;
    }
    .context-panel {
      width: 300px;
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 24px;
      z-index: 1;
    }
    /* Headers */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      font-size: 1.1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
    }
    /* Conversation List */
    .convo-list {
      flex: 1;
      overflow-y: auto;
    }
    .convo-list::-webkit-scrollbar, .chat-history::-webkit-scrollbar {
      width: 6px;
    }
    .convo-list::-webkit-scrollbar-thumb, .chat-history::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }
    .convo-item {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .convo-item:hover {
      background: var(--bg-hover);
      transform: translateX(4px);
    }
    .convo-item.active {
      background: rgba(99, 102, 241, 0.15);
      border-left: 4px solid var(--accent);
      padding-left: 20px;
    }
    .convo-user {
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 1.05em;
    }
    .convo-snippet {
      font-size: 0.85em;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      font-size: 0.7em;
      padding: 3px 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      margin-left: 8px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge.human_requested { background: rgba(245, 158, 11, 0.2); color: var(--orange); border: 1px solid rgba(245,158,11,0.3); }
    .badge.human_active { background: rgba(16, 185, 129, 0.2); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
    /* Chat Area */
    .chat-history {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 75%;
      padding: 12px 18px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.95em;
      box-shadow: var(--shadow-sm);
    }
    .msg-user {
      background: rgba(255, 255, 255, 0.08);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .msg-ai {
      background: linear-gradient(135deg, #2b5278, #1e3a5f);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .msg-agent {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }
    .chat-input-area input {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid var(--border-color);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-family: inherit;
      font-size: 1em;
      transition: all 0.2s;
    }
    .chat-input-area input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .btn {
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      font-family: inherit;
      font-size: 0.95em;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      filter: brightness(1.1);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
    /* Context */
    .context-item {
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.03);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .context-label {
      font-size: 0.75em;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .context-value {
      font-weight: 500;
      font-size: 1.05em;
    }
    .typing-indicator {
      display: none;
      font-size: 0.85em;
      color: var(--text-muted);
      margin-top: 12px;
      font-style: italic;
    }
    /* Mobile Styles */
    .mobile-back-btn, .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-main);
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        border-right: none;
      }
      .main-chat {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        width: 100%;
        background: radial-gradient(circle at 100% 0%, #1e1b4b 0%, #0f172a 60%, #000 100%);
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        z-index: 10;
      }
      body.chat-active .main-chat {
        transform: translateX(0);
      }
      .context-panel {
        display: none !important;
      }
      .mobile-back-btn {
        display: flex !important;
        align-items: center;
        justify-content: center;
        padding: 15px 20px 15px 0;
        margin-right: 5px;
        font-size: 1.5em;
      }
      .mobile-menu-btn {
        display: inline-block !important;
        padding: 12px 16px;
        font-size: 0.9em;
        font-weight: 600;
        background: rgba(255,255,255,0.1) !important;
        border-radius: 8px;
      }
      .context-panel.mobile-open {
        display: flex !important;
        position: absolute;
        top: 70px; right: 15px;
        z-index: 1000;
        background: rgba(25, 25, 30, 0.95);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        border-radius: 16px;
        width: calc(100vw - 30px);
        max-width: 320px;
        height: auto;
        padding: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar: Conversations -->
  <div class="sidebar">
    <div class="header">
      Conversations
      <a href="/admin/" style="color:var(--text-muted);text-decoration:none;font-size:0.85em;">&larr; Admin</a>
    </div>
    <div class="convo-list" id="convo-list">
      <!-- Populated via JS -->
    </div>
  </div>

  <!-- Main Chat Window -->
  <div class="main-chat">
    <div class="header" id="chat-header">
      <button id="mobile-back-btn" class="mobile-back-btn" onclick="goBackToList()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span id="chat-header-text">Select a conversation</span>
      <button id="mobile-menu-btn" class="mobile-menu-btn" onclick="toggleMobileMenu()">Details</button>
    </div>
    <div class="chat-history" id="chat-history">
      <!-- Populated via JS -->
    </div>
    <div class="typing-indicator" id="typing-indicator" style="padding: 0 20px;">User is typing...</div>
    <div class="chat-input-area" id="chat-input-area" style="display: none;">
      <input type="text" id="chat-input" placeholder="Type a message... (Press Enter to send)">
      <button class="btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Right Context Panel -->
  <div class="context-panel" id="context-panel" style="display: none;">
    <div class="header" style="padding:0 0 15px 0; margin-bottom: 15px;">User Info</div>
    
    <div class="context-item">
      <div class="context-label">Account</div>
      <div class="context-value" id="ctx-email">-</div>
    </div>
    
    <div class="context-item">
      <div class="context-label">IP Address</div>
      <div class="context-value" id="ctx-ip">-</div>
    </div>

    <div class="context-item">
      <div class="context-label">Location</div>
      <div class="context-value" id="ctx-location">-</div>
    </div>

    <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
      <button class="btn" id="btn-takeover" onclick="takeOver()">Take Over Chat</button>
      <button class="btn" id="btn-handback" onclick="handBackToAI()" style="display:none; background:#6366f1;">Hand back to AI</button>
      <button class="btn btn-danger" id="btn-close" onclick="closeChat()">Close Conversation</button>
    </div>
  </div>

  <script>
    let activeConvoId = null;
    let convoPoll = null;
    let chatSocket = null;
    let typingTimeout = null;

    function goBackToList() {
      document.body.classList.remove('chat-active');
    }

    function toggleMobileMenu() {
      document.getElementById('context-panel').classList.toggle('mobile-open');
    }

    // Fetch conversations list
    async function loadConversations() {
      try {
        const res = await fetch('/admin-chat/api/conversations/');
        const data = await res.json();
        const list = document.getElementById('convo-list');
        list.innerHTML = '';
        data.conversations.forEach(c => {
          const div = document.createElement('div');
          div.className = 'convo-item' + (c.id === activeConvoId ? ' active' : '');
          div.onclick = () => selectConversation(c.id, c.user);
          div.innerHTML = `
            <div class="convo-user">
              ${c.user} <span class="badge ${c.status}">${c.status_display}</span>
            </div>
            <div class="convo-snippet">${c.last_msg || 'No messages'}</div>
            <div style="font-size:0.7em; color:var(--text-muted); margin-top:5px;">${c.updated_at}</div>
          `;
          list.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    // Select a conversation
    function selectConversation(id, userName) {
      activeConvoId = id;
      document.getElementById('chat-header-text').innerText = `Chatting with: ${userName}`;
      document.getElementById('chat-input-area').style.display = 'flex';
      // Context panel is hidden on mobile via CSS, but we keep this for desktop
      document.getElementById('context-panel').style.display = 'flex';
      document.body.classList.add('chat-active');
      
      // Update UI selection
      document.querySelectorAll('.convo-item').forEach(el => el.classList.remove('active'));
      
      loadMessages();
      
      if (chatSocket) chatSocket.close();
      const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
      chatSocket = new WebSocket(`${wsScheme}://${window.location.host}/ws/chat/${activeConvoId}/`);
      
      chatSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);
        if (data.type === 'message') {
          renderSingleMessage(data);
        } else if (data.type === 'typing') {
          if (data.role === 'user') {
            const ind = document.getElementById('typing-indicator');
            ind.style.display = data.is_typing ? 'block' : 'none';
          }
        }
      };

      loadConversations(); // highlight active
    }

    function renderSingleMessage(m) {
      const history = document.getElementById('chat-history');
      const wasScrolledToBottom = history.scrollHeight - history.clientHeight <= history.scrollTop + 10;
      
      const div = document.createElement('div');
      div.className = 'message ' + (m.role === 'user' ? 'msg-user' : (m.role === 'agent' ? 'msg-agent' : 'msg-ai'));
      div.innerHTML = `<div>${m.message.replace(/\\n/g, '<br>')}</div><div style="font-size:0.7em; opacity:0.7; margin-top:5px; text-align:right;">${m.created_at}</div>`;
      history.appendChild(div);
      
      if (wasScrolledToBottom) {
        history.scrollTop = history.scrollHeight;
      }
    }

    // Fetch messages for active conversation
    async function loadMessages() {
      if (!activeConvoId) return;
      try {
        const res = await fetch(`/admin-chat/api/messages/${activeConvoId}/`);
        const data = await res.json();
        
        // Render messages
        const history = document.getElementById('chat-history');
        const wasScrolledToBottom = history.scrollHeight - history.clientHeight <= history.scrollTop + 10;
        
        history.innerHTML = '';
        data.messages.forEach(m => {
          const div = document.createElement('div');
          div.className = 'message ' + (m.role === 'user' ? 'msg-user' : (m.role === 'agent' ? 'msg-agent' : 'msg-ai'));
          div.innerHTML = `<div>${m.content.replace(/\\n/g, '<br>')}</div><div style="font-size:0.7em; opacity:0.7; margin-top:5px; text-align:right;">${m.created_at}</div>`;
          history.appendChild(div);
        });
        
        if (wasScrolledToBottom) {
          history.scrollTop = history.scrollHeight;
        }

        // Render context panel
        document.getElementById('ctx-email').innerText = data.user_info.email || 'Guest';
        document.getElementById('ctx-ip').innerText = data.user_info.ip || '-';
        document.getElementById('ctx-location').innerHTML = data.user_info.location || '-';

        // Update buttons
        const btnTakeover = document.getElementById('btn-takeover');
        const btnHandback = document.getElementById('btn-handback');
        if (data.status === 'human_active') {
          btnTakeover.innerText = 'You are in control';
          btnTakeover.disabled = true;
          btnTakeover.style.opacity = '0.5';
          btnHandback.style.display = 'block';
        } else {
          btnTakeover.innerText = 'Take Over Chat';
          btnTakeover.disabled = false;
          btnTakeover.style.opacity = '1';
          btnHandback.style.display = 'none';
        }

      } catch (e) { console.error(e); }
    }

    // Send a message
    async function sendMessage() {
      if (!activeConvoId) return;
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      if (chatSocket) chatSocket.send(JSON.stringify({type: 'typing', role: 'agent', is_typing: false}));
      
      try {
        await fetch(`/admin-chat/api/send/${activeConvoId}/`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: text})
        });
      } catch(e) { console.error(e); }
      input.focus();
    }

    // Input Enter key binding
    const inputEl = document.getElementById('chat-input');
    inputEl.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });
    
    inputEl.addEventListener('input', function(e) {
      if (chatSocket) chatSocket.send(JSON.stringify({type: 'typing', role: 'agent', is_typing: true}));
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        if (chatSocket) chatSocket.send(JSON.stringify({type: 'typing', role: 'agent', is_typing: false}));
      }, 2000);
    });

    // Take over
    async function takeOver() {
      if (!activeConvoId) return;
      try {
        await fetch(`/admin-chat/api/take-over/${activeConvoId}/`, {method: 'POST'});
        loadMessages();
      } catch(e) { console.error(e); }
    }

    // Hand back to AI
    async function handBackToAI() {
      if (!activeConvoId) return;
      try {
        await fetch(`/admin-chat/api/hand-back/${activeConvoId}/`, {method: 'POST'});
        loadMessages();
      } catch(e) { console.error(e); }
    }

    // Close
    async function closeChat() {
      if (!activeConvoId) return;
      if (!confirm("Are you sure you want to close this chat?")) return;
      try {
        await fetch(`/admin-chat/api/close/${activeConvoId}/`, {method: 'POST'});
        activeConvoId = null;
        if (chatSocket) chatSocket.close();
        document.getElementById('chat-header-text').innerText = 'Select a conversation';
        document.getElementById('chat-input-area').style.display = 'none';
        document.getElementById('context-panel').style.display = 'none';
        document.getElementById('chat-history').innerHTML = '';
        loadConversations();
      } catch(e) { console.error(e); }
    }

    // Toggle Mobile Menu
    function toggleMobileMenu() {
      const panel = document.getElementById('context-panel');
      if (panel) panel.classList.toggle('mobile-open');
    }

    // Start polling
    loadConversations();
    convoPoll = setInterval(loadConversations, 5000);
  </script>
</body>
</html>
