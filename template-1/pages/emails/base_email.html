<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            color: #111111;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #eeeeee;
        }
        .header {
            background-color: #111111;
            padding: 30px 40px;
            text-align: center;
        }
        .header img {
            max-width: 150px;
        }
        .content {
            padding: 40px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
        }
        p {
            font-size: 15px;
            line-height: 1.6;
            color: #444444;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background-color: #111111;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .footer {
            background-color: #fafafa;
            padding: 30px 40px;
            text-align: center;
            border-top: 1px solid #eeeeee;
        }
        .footer p {
            font-size: 13px;
            color: #888888;
            margin: 0;
        }
        .footer a {
            color: #111111;
            text-decoration: underline;
        }
        .receipt-box {
            background-color: #f9f9f9;
            border: 1px solid #eeeeee;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .receipt-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px solid #dddddd;
            font-weight: 600;
            font-size: 16px;
        }
        .text-right {
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- Using a white version of the logo if possible, or just text if logo isn't hosted -->
            <h2 style="color: #ffffff; margin: 0; font-family: sans-serif; letter-spacing: 2px;">RYDER PRO</h2>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>&copy; 2026 Ryder Pro. All rights reserved.</p>
            <p style="margin-top: 10px;">
                <a href="https://www.ryder-pro.com/contact">Contact Support</a> | 
                <a href="https://www.ryder-pro.com">Visit Website</a>
            </p>
        </div>
    </div>
</body>
</html>
