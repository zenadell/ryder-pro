{% load static %}
<style>
/* Sticky Header */
.navbar-spacer {
    height: 70px;
}
.navbar.w-nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    background: #fff !important;
    padding-top: 10px !important;
    padding-bottom: 10px !important;
    min-height: auto !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}


@media screen and (max-width: 991px) {
    .nav-menu {
        background: #111 !important;
        border-radius: 0 0 24px 24px !important;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5) !important;
        padding: 20px !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        border-top: none !important;
        max-height: 80vh !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
    }
    .nav-link {
        color: #fff !important;
        border-bottom: 1px solid rgba(255,255,255,0.05) !important;
        padding: 12px 20px !important;
        font-size: 15px !important;
        transition: background 0.3s !important;
        border-radius: 8px !important;
    }
    .nav-link:hover {
        background: rgba(255,255,255,0.1) !important;
    }
    .w-button {
        width: 100% !important;
        margin-top: 10px !important;
        padding: 12px 20px !important;
        font-weight: 600 !important;
        font-size: 15px !important;
        margin-left: 0 !important;
        text-align: center !important;
        background-color: #cc0000 !important;
    }
    .auth-buttons-wrapper {
        display: flex;
        gap: 12px;
        padding: 15px 0;
        margin-top: 5px;
        border-top: 1px solid rgba(255,255,255,0.05);
    }
    .login-btn {
        flex: 1 !important;
        text-align: center !important;
        border: 1px solid rgba(255,255,255,0.2) !important;
        border-bottom: 1px solid rgba(255,255,255,0.2) !important;
        padding: 12px !important;
        border-radius: 12px !important;
        margin: 0 !important;
    }
    .signup-btn {
        flex: 1 !important;
        text-align: center !important;
        padding: 12px !important;
        border-radius: 12px !important;
        margin: 0 !important;
        background: linear-gradient(135deg, #e60000 0%, #b30000 100%) !important;
        box-shadow: 0 4px 15px rgba(230,0,0,0.3) !important;
        width: auto !important;
    }
    
    /* Mobile Submenu */
    .mobile-dropdown-content { 
        display: none; 
        padding-left: 15px; 
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .mobile-dropdown.open .mobile-dropdown-content { 
        display: flex; 
        flex-direction: column;
    }
    .mobile-dropdown-toggle {
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
}

@media screen and (min-width: 992px) {
    /* Desktop layout overrides to prevent squishing */
    .grid-nav {
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        width: 100%;
    }
    .right-nav {
        display: flex !important;
        align-items: center !important;
        justify-content: flex-end;
        flex: 1;
    }
    .nav-menu.w-nav-menu {
        display: flex !important;
        align-items: center !important;
        gap: 5px;
    }
    .auth-buttons-wrapper {
        display: flex !important;
        gap: 15px !important;
        align-items: center !important;
        margin-left: 15px !important;
    }
    .w-button.signup-btn, .login-btn {
        width: max-content !important;
        white-space: nowrap !important;
        padding: 10px 20px !important;
        margin: 0 !important;
    }
    .nav-link {
        padding: 10px 12px !important;
        font-size: 14px !important;
    }
    
    /* Desktop unwraps the mobile dropdown */
    .mobile-dropdown { display: contents; }
    .mobile-dropdown-toggle { display: none !important; }
    .mobile-dropdown-content { display: contents; }
}

@media screen and (min-width: 992px) and (max-width: 1250px) {
    .nav-link {
        padding: 8px 8px !important;
        font-size: 13px !important;
    }
    .auth-buttons-wrapper {
        gap: 10px !important;
        margin-left: 10px !important;
    }
    .w-button.signup-btn, .login-btn {
        padding: 8px 15px !important;
        font-size: 13px !important;
    }
}
</style>

<div class="navbar-spacer"></div>
<div data-animation="default" data-collapse="medium" data-duration="400" data-easing="ease" data-easing2="ease"
    role="banner" class="navbar w-nav">
    <div class="container-full w-container">
        <div class="w-layout-grid grid-nav">
            <a href="/" id="w-node-e6ff9f79-f479-fa42-6f69-a3df18a8ef3f-18a8ef3c" class="brand w-nav-brand"> 
                <img src="{% static 'images/ryder-pro-logo.png' %}" loading="lazy" alt="" class="header-logo" style="height: 50px; width: auto; margin: 0;" />
            </a>
            <div id="w-node-e6ff9f79-f479-fa42-6f69-a3df18a8ef64-18a8ef3c" class="right-nav">
                <nav role="navigation" id="w-node-e6ff9f79-f479-fa42-6f69-a3df18a8ef41-18a8ef3c"
                    class="nav-menu w-nav-menu">
                    <a href="/" class="nav-link w-nav-link"> Home </a>
                    <a href="/about" class="nav-link w-nav-link"> About </a>
                    <a href="{% url 'all_cars' %}" class="nav-link w-nav-link"> Browse Cars </a>
                    <a href="{% url 'trade_in' %}" class="nav-link w-nav-link"> Trade-In </a>
                    
                    <div class="mobile-dropdown">
                        <div class="mobile-dropdown-toggle nav-link w-nav-link" onclick="this.parentElement.classList.toggle('open')">
                            More <span>▼</span>
                        </div>
                        <div class="mobile-dropdown-content">
                            <a href="{% url 'jobs_list' %}" class="nav-link w-nav-link"> Careers </a>
                            <a href="/contact" class="nav-link w-nav-link"> Contact </a>
                        </div>
                    </div>
                    
                    <a href="{% url 'shipment_tracking' %}" class="nav-link w-nav-link" style="color: var(--color--primary-1); font-weight: 600;"> Track Order </a>
                    
                    {% if user.is_authenticated %}
                        <div class="auth-buttons-wrapper">
                            <a href="{% url 'dashboard' %}" class="nav-link w-nav-link login-btn" style="color: #e60000 !important; border: 1px solid #e60000 !important; font-weight: 600;"> Dashboard </a>
                        </div>
                    {% else %}
                        <div class="auth-buttons-wrapper">
                            <a href="{% url 'login' %}" class="nav-link w-nav-link login-btn" style="color: #111;"> Log In </a>
                            <a href="{% url 'signup' %}" class="w-button signup-btn" style="color: #fff;"> Sign Up </a>
                        </div>
                    {% endif %}
                </nav>
                <div class="menu-button w-nav-button">
                    <div class="w-icon-nav-menu"></div>
                </div>
            </div>
        </div>
    </div>
</div>

{% if messages %}
<div style="max-width: 1200px; margin: 20px auto 0; padding: 0 20px; z-index: 999; position: relative;">
    {% for message in messages %}
        <div style="padding: 15px 20px; margin-bottom: 10px; border-radius: 8px; font-weight: 500;
                    {% if message.tags == 'success' %}background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;
                    {% elif message.tags == 'error' %}background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
                    {% else %}background-color: #cce5ff; color: #004085; border: 1px solid #b8daff;{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}
