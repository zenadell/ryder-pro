{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'partials/seo.html' %}
    <meta charset="utf-8" />
    
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link href="{% static 'css/vendor/carent-wbs.webflow.shared.15fbda294.css' %}" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="{% static 'base.css' %}">
    <link rel="stylesheet" href="{% static 'css/vendor/fonts.css' %}">
    <style>
        body { background-color: #f7f7f7; color: #111; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .success-container { background: #fff; border-radius: 12px; padding: 40px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 100%; border: 1px solid #eee; }
        .success-icon-wrapper { width: 80px; height: 80px; background-color: #DEF7EC; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        h1 { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 10px; }
        p.desc { color: #666; font-size: 15px; line-height: 1.5; margin-bottom: 30px; }
        .messages-container { margin-bottom: 30px; }
        .msg-alert { background-color: #f3f4f6; color: #374151; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 10px; text-align: left; }
        .msg-alert.success { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .btn-primary { display: block; width: 100%; padding: 14px; background-color: #dc2626; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; transition: background-color 0.2s ease; margin-bottom: 15px; border: none; cursor: pointer; text-align: center; }
        .btn-primary:hover { background-color: #b91c1c; }
        .btn-secondary { display: block; width: 100%; padding: 14px; background-color: transparent; border: 1px solid #e5e7eb; color: #4b5563; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; transition: background-color 0.2s ease; text-align: center; }
        .btn-secondary:hover { background-color: #f9fafb; }
    </style>
</head>
<body>

    <div class="success-container">
        <!-- Success Icon -->
        <div class="success-icon-wrapper">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>

        <h1>Payment Successful!</h1>
        <p class="desc">
            Your transaction was completed successfully. A receipt has been sent to your email address.
        </p>

        {% if messages %}
            <div class="messages-container">
            {% for message in messages %}
                <div class="msg-alert {% if message.tags %}{{ message.tags }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
            </div>
        {% endif %}

        <div>
            <a href="{% url 'dashboard' %}" class="btn-primary">
                Go to Dashboard
            </a>
            <a href="{% url 'home' %}" class="btn-secondary">
                Return to Home
            </a>
        </div>
    </div>

</body>
</html>
