{% load static %}
<div class="car-slide w-slide">
    <div class="car-collection-list-wrapper w-dyn-list">
        <div role="list" class="car-collection-list w-dyn-items">
            <!-- Card 1 -->
            <div role="listitem" class="car-collection-item w-dyn-item">
                <a style="opacity:1" href="#" class="car-item w-inline-block">
                    <div class="car-image-wrap">
                        <div class="skeleton-pulse car-image" style="width:100%; height:180px;"></div>
                    </div>
                    <div>
                        <div class="car-title-wrap" style="align-items: center;">
                            <h3 class="car-title skeleton-pulse" style="width:60%; height:24px; margin:0;"></h3>
                            <div class="car-price-wrap skeleton-pulse" style="width:30%; height:24px;"></div>
                        </div>
                        <div class="car-divider"></div>
                        <div class="grid-car-meta">
                            <div class="car-meta-item">
                                <div class="skeleton-pulse car-meta-icon" style="width:24px; height:24px; border-radius:50%;"></div>
                                <div>
                                    <div class="skeleton-pulse" style="width:30px; height:12px; margin-bottom:4px;"></div>
                                    <div class="skeleton-pulse" style="width:40px; height:16px;"></div>
                                </div>
                            </div>
                            <div class="car-meta-item">
                                <div class="skeleton-pulse car-meta-icon" style="width:24px; height:24px; border-radius:50%;"></div>
                                <div>
                                    <div class="skeleton-pulse" style="width:40px; height:12px; margin-bottom:4px;"></div>
                                    <div class="skeleton-pulse" style="width:40px; height:16px;"></div>
                                </div>
                            </div>
                            <div class="car-meta-item">
                                <div class="skeleton-pulse car-meta-icon" style="width:24px; height:24px; border-radius:50%;"></div>
                                <div>
                                    <div class="skeleton-pulse" style="width:40px; height:12px; margin-bottom:4px;"></div>
                                    <div class="skeleton-pulse" style="width:40px; height:16px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
