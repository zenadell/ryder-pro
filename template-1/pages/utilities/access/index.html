    <div class="utility-page-wrap">

            <form action="/.wf_auth" method="post" id="email-form" name="email-form" data-name="Email Form"
                class="utility-page-form w-password-page" 
                >
                <img src="{% static 'images/utility-lock.ae54711958.svg' %}" alt=""
                    class="password-image" />
                <h1 class="heading-h2">
                    Protected Page
                </h1>
                <label for="pass" class="w-password-page">
                    Password
                </label>
                <input class="form-input w-password-page w-input" autofocus="true" maxlength="256" name="pass"
                    data-name="field" placeholder="Enter your password" type="password" id="pass" />
                <input type="submit" data-wait="Please wait..." class="button-submit w-password-page w-button"
                    value="Submit" />
                <div class="error-message w-password-page w-form-fail">
                    <div>
                        Incorrect password. Please try again.
                    </div>
                </div>
                <div style="display:none" class="w-password-page w-embed w-script">
                    <input type="hidden" name="path" value="&lt;%WF_FORM_VALUE_PATH%&gt;" />
                    <input type="hidden" name="page" value="&lt;%WF_FORM_VALUE_PAGE%&gt;" />
                </div>
                <div style="display:none" class="w-password-page w-embed w-script">
                    <script type="application/javascript">
                        (function _handlePasswordPageOnload() {
                            if (/[?&amp;]e=1(&amp;|$)/.test(document.location.search)) {
                                document.querySelector(&#39;.w - password - page.w - form - fail &#39;).style.display = &#39; block &#39;;
                            }
                        })()
                    </script>
                </div>
            </form>
