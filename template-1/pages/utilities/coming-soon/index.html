{% load static %}
<!DOCTYPE html>
<html
    lang="en">

<head>
    {% include 'partials/seo.html' %}
    <meta charset="utf-8" />
    <link href="https://cdn.prod.website-files.com" rel="preconnect" />
    
    
    <meta content="Coming Soon | Carent -  | Ryder Pro" property="og:title" />
    <meta
        content="Elegant and efficient car rental website template. Simplify bookings, impress clients, and manage your fleet effortlessly with our modern design."
        property="og:description" />
    <meta content="../../../static/images/6792418350d024ed798003c7_open-graph.jpg"
        property="og:image" />
    <meta content="Coming Soon | Carent -  | Ryder Pro" name="twitter:title" />
    <meta
        content="Elegant and efficient car rental website template. Simplify bookings, impress clients, and manage your fleet effortlessly with our modern design."
        name="twitter:description" />
    <meta content="../../../static/images/6792418350d024ed798003c7_open-graph.jpg"
        name="twitter:image" />
    <meta property="og:type" content="website" />
    <meta content="summary_large_image" name="twitter:card" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
        <link href="{% static 'css/vendor/carent-wbs.webflow.shared.15fbda294.css' %}"
        rel="stylesheet" type="text/css" />
    
    
    
    
    <script type="text/javascript">
        !function(o,c){var n=c.documentElement,t=" w-mod-";n.className+=t+"js",("ontouchstart"in o||o.DocumentTouch&&c instanceof DocumentTouch)&&(n.className+=t+"touch")}(window,document);
    </script>
    <link href="{% static 'images/67568254484a2c996bed3b46_favicon.png' %}"
        rel="shortcut icon" type="image/x-icon" />
    <link href="{% static 'images/675682577cdfa45b9641fd56_webclip.png' %}"
        rel="apple-touch-icon" />
<link rel="stylesheet" href="{% static 'base.css' %}">
    <link rel="stylesheet" href="{% static 'utilities/coming-soon/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/vendor/fonts.css' %}">
</head>

<body>
    <div class="utility-page-wrap">
        <div class="utility-page-coming-soon">
            <img src="{% static 'images/658a73e52a1131d1c3f0a03d_coming-soon.svg' %}"
                loading="eager" alt="" class="coming-soon-icon" />
            <h1 class="coming-soon-title">
                We are coming soon!
            </h1>
            <p>
                We&#39;re bringing something fresh and exciting to the table. Be the first to experience it!
            </p>
            <div class="coming-subscribe-wrap w-form">
                <form id="wf-form-Email-Form" name="wf-form-Email-Form" data-name="Email Form" method="get"
                    class="subscribe-form" 
                    >
                    <div>
                        <input class="form-input w-input" maxlength="256" name="Your-Email" data-name="Your Email"
                            placeholder="Your Email..." type="email" id="Your-Email" required="" />
                        <input type="submit" data-wait="Please wait..." class="button-submit w-button"
                            value="Notify Me" />
                    </div>
                </form>
                <div class="success-message w-form-done">
                    <div>
                        Thank you! Your submission has been received!
                    </div>
                </div>
                <div class="error-message w-form-fail">
                    <div>
                        Oops! Something went wrong while submitting the form.
                    </div>
                </div>
            </div>
            <div class="coming-soon-social">
                <div class="text-bold">
                    Follow us:
                </div>
                <div class="social-icon-wrap">
                    <a href="https://www.instagram.com/" target="_blank" class="social-link w-inline-block"> <img
                            src="{% static 'images/674ef5a1e5492efe3a216c65_instagram-01.svg' %}"
                            loading="eager" alt="" class="social-icon" />
                    </a>
                    <a href="https://www.facebook.com/" target="_blank" class="social-link w-inline-block"> <img
                            src="{% static 'images/674ef5a14bd1a7ce84a50844_facebook-01.svg' %}"
                            loading="eager" alt="" class="social-icon" />
                    </a>
                    <a href="https://www.linkedin.com/" target="_blank" class="social-link w-inline-block"> <img
                            src="{% static 'images/674ef5a06b3750c9076d9d00_linkedin-01.svg' %}"
                            loading="eager" alt="" class="social-icon" />
                    </a>
                    <a href="https://twitter.com/" target="_blank" class="social-link w-inline-block"> <img
                            src="{% static 'images/674ef5a14691a8b4bbdf755a_twitter-x-01.svg' %}"
                            loading="eager" width="20" alt="" class="social-icon" />
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="{% static 'js/vendor/jquery-3.5.1.min.dc5e7f18c8.js' %}"
        type="text/javascript" >
        </script>
    <script src="{% static 'js/vendor/webflow.schunk.36b8fb49256177c8.js' %}"
        type="text/javascript" >
        </script>
    <script src="{% static 'js/vendor/webflow.schunk.d06f3e3d4876fc44.js' %}"
        type="text/javascript" >
        </script>
    <script src="{% static 'js/vendor/webflow.ab90213a.11e7a0ca1b854709.js' %}"
        type="text/javascript" >
        </script>
<script src="{% static 'base.js' %}"></script>
    <script src="{% static 'utilities/coming-soon/script.js' %}"></script>
<script src="{% static 'js/custom-animations.js' %}"></script>
</body>

</html>
